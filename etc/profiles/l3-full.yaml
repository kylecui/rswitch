# rSwitch Profile: L3 Full Managed Switch
#
# Full-featured managed switch with L3 routing:
# - 802.1Q VLAN processing
# - DHCP snooping
# - ACL-based packet filtering
# - Traffic mirroring (SPAN)
# - IP routing with LPM tables
# - MAC learning
# - QoS traffic marking and scheduling
# - Web management portal with namespace isolation
#
# Pipeline:
#   Ingress: dispatcher → vlan → dhcp_snoop → acl → mirror → route → l2learn → lastcall
#   Egress:  egress_qos → egress_vlan → egress_final
#
# Use case: Production managed switch/router with full L2/L3 capabilities

name: l3-full
description: "Full L3 managed switch with routing, ACL, QoS, and mirroring"
version: "2.0"

ingress:
  - vlan
  - dhcp_snoop
  - acl
  - mirror
  - route
  - l2learn
  - lastcall

egress:
  - egress_qos
  - egress_vlan
  - egress_final

settings:
  mac_learning: true
  mac_aging_time: 300
  vlan_enforcement: true
  default_vlan: 1
  ip_routing: true
  route_table_size: 1024
  acl_enabled: true
  acl_default_action: "permit"
  qos_enabled: true
  qos_default_prio: 1
  mirror_enabled: true
  unknown_unicast_flood: true
  broadcast_flood: true
  multicast_flood: true
  stats_enabled: true
  ringbuf_enabled: true
  notify_mac_learned: true
  notify_mac_moved: true
  notify_acl_drop: true
  debug: false

port_defaults:
  vlan_mode: trunk
  allowed_vlans: [1]
  native_vlan: 1
  mac_learning: true
  default_priority: 1
  qos_config:
    enable_afxdp: false
    prio_mask: 0x0C

management:
  enabled: true
  port: 8080
  use_namespace: true
  namespace_name: rswitch-mgmt
  iface_mode: dhcp
  mgmt_vlan: 1
  auth_enabled: true
  auth_user: admin
  auth_password: rswitch

dhcp_snooping:
  enabled: true
  drop_rogue_server: true

# Per-port overrides (optional):
# ports:
#   - interface: eth1
#     vlan_mode: access
#     access_vlan: 10

# VLAN definitions (optional):
# vlans:
#   - vlan_id: 1
#     name: "default"
