# rSwitch Profile: QoS with VOQd
#
# L2 switch with Quality of Service and Virtual Output Queuing:
# - VLAN-based traffic segmentation
# - QoS priority classification (CRITICAL, HIGH, NORMAL, LOW)
# - AF_XDP redirect for high-priority traffic to user-space VOQd
# - DRR scheduling for fair bandwidth allocation
# - Veth egress path for proper QoS and VLAN processing
#
# Pipeline:
#   Ingress: vlan → l2learn → afxdp_redirect → lastcall
#   Egress: egress_qos → egress_vlan → egress_final
#
# QoS Classification defaults:
#   CRITICAL (prio=3): SSH(22), DNS(53), SNMP(161)
#   HIGH (prio=2): HTTP(80,443), ICMP
#   NORMAL (prio=1): Other TCP/UDP
#   LOW (prio=0): FTP(20,21)

name: qos-voqd
description: "L2 switch with QoS and Virtual Output Queuing (VOQd)"
version: "1.0"

ingress:
  - vlan
  - l2learn
  - afxdp_redirect
  - lastcall

egress:
  - egress_qos
  - egress_vlan
  - egress_final

settings:
  mac_learning: true
  mac_aging_time: 300
  vlan_enforcement: true
  default_vlan: 1
  qos_enabled: true
  qos_default_prio: 1
  afxdp_redirect_enabled: true
  afxdp_prio_mask: 0x0C
  unknown_unicast_flood: true
  broadcast_flood: true
  multicast_flood: true
  stats_enabled: true
  ringbuf_enabled: true
  debug: false

voqd_config:
  enabled: true
  mode: active
  num_ports: 4
  prio_mask: 0x0C
  enable_afxdp: true
  zero_copy: false
  rx_ring_size: 2048
  tx_ring_size: 2048
  frame_size: 2048
  batch_size: 256
  poll_timeout_ms: 100
  busy_poll: false
  cpu_affinity: -1
  enable_scheduler: true
  use_veth_egress: true
  veth_in_ifname: veth_voq_in

# ports and vlans sections: configured per-environment
# See default.yaml generated by installer for example
