# rSwitch Profile: QoS + VOQd 简化测试配置
# 
# 最小化配置，专注于 QoS 和 VOQd 功能测试
# 适用于：快速验证 QoS 优先级分类和 VOQd 基本功能
#
# Pipeline:
#   Ingress: vlan → l2learn → afxdp_redirect → lastcall
#   Egress: egress_qos → egress_vlan → egress_final

name: l3-qos-voqd-simple
description: "Simplified L3 with QoS and VOQd for quick testing"
version: "1.0"

# ============================================================================
# 处理流水线（最小化）
# ============================================================================

ingress:
  - vlan              # VLAN 处理（必需，与 egress_vlan 配对）
  - l2learn           # MAC 学习
  - afxdp_redirect    # AF_XDP 重定向（VOQd 必需）
  - lastcall          # 转发决策

egress:
  - egress_qos        # QoS 分类和限速
  - egress_vlan       # VLAN 标签处理
  - egress_final      # 清理和统计

# ============================================================================
# 全局设置
# ============================================================================

settings:
  mac_learning: true
  mac_aging_time: 300
  vlan_enforcement: true
  default_vlan: 1
  unknown_unicast_flood: true
  broadcast_flood: true
  multicast_flood: true
  stats_enabled: true
  ringbuf_enabled: true
  debug: false

# ============================================================================
# VOQd 配置（关键配置）
# ============================================================================

voqd_config:
  # 核心配置
  enabled: true                   # 启用 VOQd
  mode: active                    # active: 拦截高优先级流量
                                  # shadow: 只观察不拦截（用于测试）
                                  # bypass: 禁用 VOQd
  
  num_ports: 3                    # 端口数量
  prio_mask: 0x0C                 # 0x0C = HIGH (0x04) + CRITICAL (0x08)
                                  # 只拦截 HIGH 和 CRITICAL 优先级
  
  # AF_XDP 配置
  enable_afxdp: true              # ACTIVE 模式必需
  zero_copy: false                # 建议 false（兼容性更好）
  
  # Veth egress path (ensures egress modules run on VOQd TX)
  use_veth_egress: true
  veth_in_ifname: veth_voq_in
  
  # Ring 大小
  rx_ring_size: 2048
  tx_ring_size: 2048
  frame_size: 2048
  
  # 调度器
  enable_scheduler: true
  batch_size: 64
  poll_timeout_ms: 100
  
  # 性能
  cpu_affinity: -1                # -1 = 不绑定 CPU
  busy_poll: false                # false = 正常轮询

# ============================================================================
# 端口配置（简化）
# ============================================================================

ports:
  - interface: enp3s0
    enabled: true
    management: managed
    vlan_mode: access
    access_vlan: 1
    mac_learning: true
    default_priority: 0
    
  - interface: enp4s0
    enabled: true
    management: managed
    vlan_mode: access
    access_vlan: 1
    mac_learning: true
    default_priority: 0
    
  - interface: enp5s0
    enabled: true
    management: managed
    vlan_mode: access
    access_vlan: 1
    mac_learning: true
    default_priority: 0

# ============================================================================
# VLAN 配置（简化，全部在 VLAN 1）
# ============================================================================

vlans:
  - vlan_id: 1
    name: "default"
    description: "Default VLAN for all ports"
    tagged_ports: []
    untagged_ports: [enp3s0, enp4s0, enp5s0]

# ============================================================================
# 快速测试指南
# ============================================================================

# 1. 启动：
#    sudo ./build/rswitch_loader --profile etc/profiles/l3-qos-voqd-simple.yaml \
#                                 --ifaces enp3s0,enp4s0,enp5s0
#
# 2. 验证 VOQd：
#    ps aux | grep rswitch-voqd
#    sudo ./build/rsvoqctl --show
#
# 3. 测试流量（从另一台机器或同一机器的不同接口）：
#    # CRITICAL (SSH) - 应该被 VOQd 拦截
#    ssh user@<target_ip>
#    
#    # HIGH (HTTP) - 应该被 VOQd 拦截
#    curl http://<target_ip>
#    
#    # HIGH (ICMP) - 应该被 VOQd 拦截
#    ping <target_ip>
#    
#    # NORMAL (其他 TCP) - 走快速路径，不被拦截
#    nc <target_ip> 12345
#
# 4. 观察分类结果：
#    sudo ./build/rsqosctl --stats
#    # 应该看到不同优先级的计数
#    # Priority 0 (LOW): xxx packets
#    # Priority 1 (NORMAL): xxx packets
#    # Priority 2 (HIGH): xxx packets
#    # Priority 3 (CRITICAL): xxx packets
#
# 5. 观察 VOQd 拦截：
#    sudo cat /sys/kernel/debug/tracing/trace_pipe | grep -E "afxdp|QoS"
#    # 应该看到：
#    # [rSwitch] QoS: processed priority=3 egress=X  (CRITICAL)
#    # [rSwitch] QoS: processed priority=2 egress=X  (HIGH)
#    # [rSwitch] afxdp_redirect: Redirecting to AF_XDP (priority 3)
#
# 6. 切换到 SHADOW 模式（测试观察模式）：
#    sudo ./build/rsvoqctl --mode shadow
#    # VOQd 运行但不拦截，只统计
#
# 7. 切换回 ACTIVE 模式：
#    sudo ./build/rsvoqctl --mode active
#
# 8. 检查统计：
#    # VOQd 统计
#    sudo ./build/rsvoqctl --stats
#    
#    # 接口统计
#    sudo ./build/rsportctl --show
#    
#    # QoS 详细统计
#    sudo bpftool map dump name qos_stats_map

# ============================================================================
# 预期结果
# ============================================================================

# 优先级分类（基于端口）：
# - SSH (port 22, 161)         → CRITICAL (priority 3) → VOQd 拦截 ✓
# - DNS (port 53)              → CRITICAL (priority 3) → VOQd 拦截 ✓
# - NTP (port 123)             → CRITICAL (priority 3) → VOQd 拦截 ✓
# - HTTP/HTTPS (port 80, 443)  → HIGH (priority 2)     → VOQd 拦截 ✓
# - ICMP                       → HIGH (priority 2)     → VOQd 拦截 ✓
# - FTP data (port 20, 21)     → LOW (priority 0)      → 快速路径 ✓
# - 其他 TCP/UDP               → NORMAL (priority 1)   → 快速路径 ✓

# VOQd 行为：
# - ACTIVE 模式：拦截 HIGH + CRITICAL，其他走快速路径
# - SHADOW 模式：所有流量走快速路径，VOQd 只记录元数据
# - BYPASS 模式：VOQd 不运行，所有流量走快速路径

# 性能预期：
# - 快速路径延迟：~200-300ns
# - VOQd 路径延迟：~5-10us（包括用户态调度）
# - 吞吐量：快速路径 > 10Gbps，VOQd 路径取决于 CPU 和 ring 大小
