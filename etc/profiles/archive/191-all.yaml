# rSwitch Profile: 191 Full Modules (Physical Machine)
#
# Machine: jzzn@10.174.1.191
# NICs: enp2s0, enp3s0, enp4s0, enp5s0 (all switch ports, native XDP)
# Management: via mgmt veth namespace (DHCP on mgmt0)
#
# This profile enables ALL modules including killswitch for
# production-environment testing on physical hardware.

name: 191-all-modules
description: "Full modules profile for physical machine 10.174.1.191"
version: "1.0"

ingress:
  - killswitch
  - vlan
  - dhcp_snoop
  - arp_learn
  - acl
  - mirror
  - route
  - l2learn
  - afxdp_redirect
  - lastcall

egress:
  - egress_qos
  - egress_vlan
  - egress_final

settings:
  mac_learning: true
  mac_aging_time: 300
  vlan_enforcement: true
  default_vlan: 1
  qos_enabled: true
  qos_default_prio: 1
  afxdp_redirect_enabled: true
  afxdp_prio_mask: 0x0C
  unknown_unicast_flood: true
  broadcast_flood: true
  multicast_flood: true
  stats_enabled: true
  ringbuf_enabled: true
  debug: false

voqd_config:
  enabled: true
  mode: active
  num_ports: 4
  prio_mask: 0x0C
  enable_afxdp: true
  enable_sw_queues: false
  sw_queue_depth: 2048
  zero_copy: false
  rx_ring_size: 2048
  tx_ring_size: 2048
  frame_size: 2048
  batch_size: 256
  poll_timeout_ms: 100
  busy_poll: false
  cpu_affinity: -1
  enable_scheduler: true
  use_veth_egress: true
  veth_in_ifname: veth_voq_in

management:
  enabled: true
  port: 8080
  use_namespace: true
  namespace_name: rswitch-mgmt
  iface_mode: dhcp
  mgmt_vlan: 1
  auth_enabled: true
  auth_user: admin
  auth_password: rswitch

dhcp_snooping:
  enabled: true
  drop_rogue_server: true

ports:
  - interface: enp2s0
    vlan_mode: trunk
    allowed_vlans: [1]
    native_vlan: 1
    mac_learning: true
    default_priority: 1

  - interface: enp3s0
    vlan_mode: trunk
    allowed_vlans: [1]
    native_vlan: 1
    mac_learning: true
    default_priority: 1

  - interface: enp4s0
    vlan_mode: trunk
    allowed_vlans: [1]
    native_vlan: 1
    mac_learning: true
    default_priority: 1

  - interface: enp5s0
    vlan_mode: trunk
    allowed_vlans: [1]
    native_vlan: 1
    mac_learning: true
    default_priority: 1

vlans:
  - vlan_id: 1
    name: "default"
    untagged_ports: [enp2s0, enp3s0, enp4s0, enp5s0]
    tagged_ports: []
