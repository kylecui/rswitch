# rSwitch Profile: Dumb Switch (Hub)
#
# Minimal L2 hub with no intelligence:
# - No VLAN processing
# - No MAC learning (flood everything)
# - No management plane
# - Pure forwarding based on ingress port
#
# Pipeline: dispatcher → lastcall → egress
# Use case: Simple hub-like behavior, basic connectivity testing

name: dumb
description: "Dumb switch — floods all traffic without learning"
version: "2.0"

ingress:
  - lastcall

egress:
  - egress_final

settings:
  mac_learning: false
  vlan_enforcement: false
  unknown_unicast_flood: true
  broadcast_flood: true
  multicast_flood: true
  stats_enabled: true
  debug: false

# No port_defaults — dumb switch needs no per-port configuration
# No management — this is an unmanaged hub
