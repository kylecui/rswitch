<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rSwitch — Logs</title>
<link rel="stylesheet" href="style.css">
<script src="vendor/htmx.min.js"></script>
<script src="auth.js"></script>
<script src="vendor/alpine.min.js" defer></script>
</head>
<body x-data="logsPage()" x-init="init()">

<header class="header">
  <div class="header-brand">&#x2B21; rSwitch <span>Management</span></div>
  <div class="header-stats">
    <span>Events: <span class="stat-val" x-text="events.length"></span></span>
    <span>WS Msgs: <span class="stat-val" x-text="msgCount"></span></span>
    <span class="ws-status"><span class="ws-dot" :class="wsState"></span> <span x-text="wsState"></span></span>
  </div>
  <button class="btn btn-sm" type="button" onclick="authLogout()">Logout</button>
</header>

<nav class="sidebar">
  <a href="index.html"><span class="icon">&#x25C8;</span> Dashboard</a>
  <a href="ports.html"><span class="icon">&#x229E;</span> Ports</a>
  <a href="modules.html"><span class="icon">&#x25EC;</span> Modules</a>
  <a href="vlans.html"><span class="icon">&#x2261;</span> VLANs</a>
  <a href="acls.html"><span class="icon">&#x26CA;</span> ACLs</a>
  <a href="routes.html"><span class="icon">&#x21C4;</span> Routes</a>
  <a href="logs.html" class="active"><span class="icon">&#x2630;</span> Logs</a>
  <a href="network.html"><span class="icon">&#x2316;</span> Network</a>
  <a href="dhcp.html"><span class="icon">&#x2690;</span> DHCP Snooping</a>
  <a href="profiles.html"><span class="icon">&#x2699;</span> Profiles</a>
</nav>

<main class="main">
  <div class="page-title"><span class="icon">&#x2630;</span> Event Log</div>

  <div class="log-toolbar">
    <div class="form-group" style="margin:0;">
      <select x-model="filterSeverity" style="width:120px;">
        <option value="all">All Severity</option>
        <option value="info">Info</option>
        <option value="warn">Warning</option>
        <option value="error">Error</option>
      </select>
    </div>
    <div class="form-group" style="margin:0;">
      <select x-model="filterCategory" style="width:130px;">
        <option value="all">All Categories</option>
        <option value="system">System</option>
        <option value="port">Port</option>
        <option value="bpf">BPF</option>
        <option value="config">Config</option>
        <option value="stats">Stats</option>
        <option value="acl">ACL</option>
        <option value="module">Module</option>
        <option value="user">User</option>
      </select>
    </div>
    <div class="form-group" style="margin:0;">
      <input type="text" x-model="search" placeholder="Search events..." style="width:220px;">
    </div>
    <button class="btn btn-sm" @click="paused = !paused" x-text="paused ? '&#x25B6; Resume' : '&#x23F8; Pause'"></button>
    <button class="btn btn-sm" @click="events = []">&#x2715; Clear</button>
    <span class="text-muted" style="margin-left:auto; font-size:12px;" x-text="'Showing ' + filtered.length + ' / ' + events.length + ' events'"></span>
  </div>

  <div class="log-container" x-ref="logbox">
    <template x-for="ev in filtered" :key="ev.id">
      <div class="log-entry" :class="ev.severity">
        <span class="log-time" x-text="ev.time"></span>
        <span class="log-cat" :class="'cat-' + ev.category" x-text="ev.category"></span>
        <span class="log-sev" x-text="ev.severity"></span>
        <span class="log-msg" x-text="ev.message"></span>
      </div>
    </template>
    <div x-show="filtered.length === 0" class="empty-state">
      <div class="icon">&#x2630;</div>
      <div x-text="events.length === 0 ? 'Waiting for events...' : 'No events match filter'"></div>
    </div>
  </div>
</main>

<script>
function logsPage() {
  return {
    events: [], wsState: 'disconnected', ws: null, msgCount: 0,
    filterSeverity: 'all', filterCategory: 'all',
    search: '', paused: false, eventId: 0, historyLoaded: false,

    get filtered() {
      return this.events.filter(ev => {
        if (this.filterSeverity !== 'all' && ev.severity !== this.filterSeverity) return false;
        if (this.filterCategory !== 'all' && ev.category !== this.filterCategory) return false;
        if (this.search && !ev.message.toLowerCase().includes(this.search.toLowerCase())) return false;
        return true;
      });
    },

    async init() {
      await this.loadHistory();
      this.connectWs();
    },

    async loadHistory() {
      try {
        const resp = await apiFetch('/api/events?limit=500');
        if (resp.status === 401) return;
        const data = await resp.json();
        if (data.events && data.events.length) {
          const historical = data.events.reverse().map(ev => {
            const ts = ev.timestamp ? new Date(ev.timestamp * 1000) : new Date();
            return {
              id: ++this.eventId,
              dbId: ev.id,
              severity: ev.severity || 'info',
              category: ev.category || this.inferCategory(ev.message),
              message: ev.message || '',
              time: ts.toLocaleTimeString(),
              timestamp: ev.timestamp || 0
            };
          });
          this.events = historical;
          this.historyLoaded = true;
          this.$nextTick(() => {
            const box = this.$refs.logbox;
            if (box) box.scrollTop = box.scrollHeight;
          });
        }
      } catch (e) {
        console.error('Failed to load event history:', e);
      }
    },

    async connectWs() {
      try {
        const resp = await apiFetch('/api/ports');
        if (resp.status === 401) {
          this.wsState = 'auth-required';
          setTimeout(() => this.connectWs(), 2000);
          return;
        }
      } catch (e) {
        this.wsState = 'disconnected';
        setTimeout(() => this.connectWs(), 3000);
        return;
      }
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      this.ws = new WebSocket(proto + '//' + location.host + '/api/ws');
      this.ws.onopen = () => { this.wsState = 'connected'; console.log('WS connected'); };
      this.ws.onclose = (ev) => { this.wsState = 'reconnecting'; console.log('WS closed code=' + ev.code + ' reason=' + ev.reason); setTimeout(() => this.connectWs(), 3000); };
      this.ws.onerror = (ev) => { this.wsState = 'error'; console.error('WS error', ev); };
      this.ws.onmessage = (e) => {
        this.msgCount++;
        if (this.paused) return;
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'event') {
            const ts = msg.timestamp ? new Date(msg.timestamp * 1000) : new Date();
            const cat = msg.category || this.inferCategory(msg.message);
            const msgText = msg.message || '';
            const epoch = msg.timestamp || 0;
            if (this.historyLoaded && this.events.length > 0) {
              const last = this.events[this.events.length - 1];
              if (last.timestamp === epoch && last.message === msgText) return;
            }
            this.events.push({
              id: ++this.eventId,
              severity: msg.severity || 'info',
              category: cat,
              message: msgText,
              time: ts.toLocaleTimeString(),
              timestamp: epoch
            });
            if (this.events.length > 2000) this.events = this.events.slice(-1000);
            this.$nextTick(() => {
              const box = this.$refs.logbox;
              if (box) box.scrollTop = box.scrollHeight;
            });
          }
        } catch (err) { console.error('WS onmessage error:', err, 'raw:', e.data); }
      };
    },

    inferCategory(message) {
      if (!message) return 'system';
      const m = message.match(/^\[(\w+)\]/);
      return m ? m[1] : 'system';
    }
  };
}
</script>
</body>
</html>
