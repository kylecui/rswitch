<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rSwitch — ACLs</title>
<link rel="stylesheet" href="style.css">
<script src="vendor/htmx.min.js"></script>
<script src="auth.js"></script>
<script src="vendor/alpine.min.js" defer></script>
</head>
<body x-data="aclsPage()" x-init="init()">

<header class="header">
  <div class="header-brand">&#x2B21; rSwitch <span>Management</span></div>
  <div class="header-stats">
    <span>ACL Rules: <span class="stat-val" x-text="acls.length"></span></span>
  </div>
  <button class="btn btn-sm" type="button" onclick="authLogout()">Logout</button>
</header>

<nav class="sidebar">
  <a href="index.html"><span class="icon">&#x25C8;</span> Dashboard</a>
  <a href="ports.html"><span class="icon">&#x229E;</span> Ports</a>
  <a href="modules.html"><span class="icon">&#x25EC;</span> Modules</a>
  <a href="vlans.html"><span class="icon">&#x2261;</span> VLANs</a>
  <a href="acls.html" class="active"><span class="icon">&#x26CA;</span> ACLs</a>
  <a href="routes.html"><span class="icon">&#x21C4;</span> Routes</a>
  <a href="logs.html"><span class="icon">&#x2630;</span> Logs</a>
  <a href="network.html"><span class="icon">&#x2316;</span> Network</a>
  <a href="dhcp.html"><span class="icon">&#x2690;</span> DHCP Snooping</a>
  <a href="profiles.html"><span class="icon">&#x2699;</span> Profiles</a>
</nav>

<main class="main">
  <div class="page-title flex-between">
    <span><span class="icon">&#x26CA;</span> Access Control Lists</span>
    <button class="btn btn-primary" @click="showCreate = !showCreate; editingAcl = null">+ Add Rule</button>
  </div>

  <div x-show="showCreate || editingAcl" x-transition class="card">
    <div class="card-header" x-text="editingAcl ? 'Edit ACL Rule #' + editingAcl.id : 'Add ACL Rule'"></div>
    <form @submit.prevent="editingAcl ? updateAcl() : createAcl()">
      <div class="form-inline mt-12">
        <div class="form-group">
          <label>Priority</label>
          <input type="number" x-model.number="formAcl.priority" min="0" max="65535" style="width:80px;" required>
        </div>
        <div class="form-group">
          <label>Action</label>
          <select x-model="formAcl.action">
            <option value="permit">Permit</option>
            <option value="deny">Deny</option>
          </select>
        </div>
        <div class="form-group">
          <label>Protocol</label>
          <select x-model="formAcl.protocol">
            <option value="any">Any</option>
            <option value="tcp">TCP</option>
            <option value="udp">UDP</option>
            <option value="icmp">ICMP</option>
          </select>
        </div>
      </div>
      <div class="form-inline mt-12">
        <div class="form-group">
          <label>Source IP</label>
          <input type="text" x-model="formAcl.src_ip" placeholder="any" style="width:160px;">
        </div>
        <div class="form-group">
          <label>Source Port</label>
          <input type="text" x-model="formAcl.src_port" placeholder="any" style="width:80px;">
        </div>
        <div class="form-group">
          <label>Dest IP</label>
          <input type="text" x-model="formAcl.dst_ip" placeholder="any" style="width:160px;">
        </div>
        <div class="form-group">
          <label>Dest Port</label>
          <input type="text" x-model="formAcl.dst_port" placeholder="any" style="width:80px;">
        </div>
        <button type="submit" class="btn btn-primary" x-text="editingAcl ? 'Update' : 'Add'"></button>
        <button type="button" class="btn" @click="cancelForm()">Cancel</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Type</th>
            <th>Priority</th>
            <th>Action</th>
            <th>Protocol</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Hits</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="(acl, idx) in acls" :key="acl.id ?? idx">
            <tr>
              <td class="text-muted" x-text="acl.id ?? idx"></td>
              <td class="mono text-muted" x-text="acl.type || '5tuple'"></td>
              <td x-text="acl.priority"></td>
              <td>
                <span class="badge" :class="acl.action === 'permit' ? 'badge-permit' : 'badge-deny'" x-text="acl.action"></span>
              </td>
              <td class="mono" x-text="formatProto(acl.protocol)"></td>
              <td class="mono" x-text="formatSrc(acl)"></td>
              <td class="mono" x-text="formatDst(acl)"></td>
              <td class="mono" x-text="acl.hits || 0"></td>
              <td>
                <button class="btn btn-sm" @click="editAcl(acl)">Edit</button>
                <button class="btn btn-sm btn-danger" @click="deleteAcl(acl.id ?? idx)">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <div x-show="acls.length === 0" class="empty-state">
      <div class="icon">&#x26CA;</div>
      <div>No ACL rules configured</div>
    </div>
  </div>
</main>

<div x-show="toast" x-transition class="toast" :class="toastClass" x-text="toastMsg"
     x-init="$watch('toast', v => { if(v) setTimeout(()=>toast=false, 3000) })"></div>

<script>
function aclsPage() {
  return {
    acls: [],
    showCreate: false,
    editingAcl: null,
    formAcl: { priority: 100, action: 'permit', protocol: 'any', src_ip: '', src_port: '', dst_ip: '', dst_port: '' },
    toast: false, toastMsg: '', toastClass: '',

    init() {
      this.fetchAcls();
      setInterval(() => this.fetchAcls(), 5000);
    },

    resetForm() {
      this.formAcl = { priority: 100, action: 'permit', protocol: 'any', src_ip: '', src_port: '', dst_ip: '', dst_port: '' };
    },

    cancelForm() {
      this.showCreate = false;
      this.editingAcl = null;
      this.resetForm();
    },

    formatProto(p) {
      if (p === 1 || p === 'icmp') return 'ICMP';
      if (p === 6 || p === 'tcp') return 'TCP';
      if (p === 17 || p === 'udp') return 'UDP';
      if (p === 0 || p === 'any' || !p) return 'any';
      return String(p);
    },

    formatSrc(acl) {
      const ip = (acl.src_ip === '0.0.0.0' || !acl.src_ip) ? 'any' : acl.src_ip;
      const port = acl.src_port && acl.src_port !== 0 ? ':' + acl.src_port : '';
      return ip + port;
    },

    formatDst(acl) {
      const ip = (acl.dst_ip === '0.0.0.0' || !acl.dst_ip) ? 'any' : acl.dst_ip;
      const port = acl.dst_port && acl.dst_port !== 0 ? ':' + acl.dst_port : '';
      return ip + port;
    },

    async fetchAcls() {
      try {
        const d = await (await apiFetch('/api/acls')).json();
        this.acls = d.acls || d || [];
      } catch {}
    },

    async createAcl() {
      const body = { ...this.formAcl };
      if (body.src_port) body.src_port = parseInt(body.src_port) || 0;
      if (body.dst_port) body.dst_port = parseInt(body.dst_port) || 0;
      try {
        const r = await apiFetch('/api/acls', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (r.ok) {
          this.showToast('ACL rule added', 'toast-success');
          this.cancelForm();
          this.fetchAcls();
        } else {
          const err = await r.json().catch(() => ({}));
          this.showToast(err.error || 'Failed to add rule', 'toast-error');
        }
      } catch { this.showToast('Request failed', 'toast-error'); }
    },

    editAcl(acl) {
      this.editingAcl = acl;
      this.showCreate = false;
      this.formAcl = {
        priority: acl.priority || 0,
        action: acl.action || 'permit',
        protocol: this.formatProto(acl.protocol).toLowerCase(),
        src_ip: (acl.src_ip === '0.0.0.0' || acl.src_ip === 'any') ? '' : acl.src_ip,
        src_port: acl.src_port || '',
        dst_ip: (acl.dst_ip === '0.0.0.0' || acl.dst_ip === 'any') ? '' : acl.dst_ip,
        dst_port: acl.dst_port || ''
      };
    },

    async updateAcl() {
      if (!this.editingAcl) return;
      const id = this.editingAcl.id ?? 0;
      const body = { ...this.formAcl };
      if (body.src_port) body.src_port = parseInt(body.src_port) || 0;
      if (body.dst_port) body.dst_port = parseInt(body.dst_port) || 0;
      try {
        const r = await apiFetch('/api/acls/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (r.ok) {
          this.showToast('ACL rule updated', 'toast-success');
          this.cancelForm();
          this.fetchAcls();
        } else {
          const err = await r.json().catch(() => ({}));
          this.showToast(err.error || 'Failed to update rule', 'toast-error');
        }
      } catch { this.showToast('Request failed', 'toast-error'); }
    },

    async deleteAcl(id) {
      if (!confirm('Delete ACL rule #' + id + '?')) return;
      try {
        const r = await apiFetch('/api/acls/' + id, { method: 'DELETE' });
        if (r.ok) { this.showToast('Rule deleted', 'toast-success'); this.fetchAcls(); }
        else this.showToast('Delete failed', 'toast-error');
      } catch { this.showToast('Request failed', 'toast-error'); }
    },

    showToast(msg, cls) { this.toastMsg = msg; this.toastClass = cls; this.toast = true; }
  };
}
</script>
</body>
</html>
