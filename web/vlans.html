<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rSwitch — VLANs</title>
<link rel="stylesheet" href="style.css">
<style>
.port-dropdown {
  position:absolute;top:100%;left:0;z-index:50;min-width:160px;max-height:220px;overflow-y:auto;
  background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 0;margin-top:4px;box-shadow:0 4px 12px rgba(0,0,0,.4);
}
.port-check {
  display:flex;align-items:center;gap:6px;padding:4px 12px;font-size:13px;
  font-family:var(--font-mono);cursor:pointer;color:var(--text-primary);
}
.port-check:hover { background:var(--bg-hover); }
.port-check input[type="checkbox"] { accent-color:var(--accent-blue); }
</style>
<script src="vendor/htmx.min.js"></script>
<script src="auth.js"></script>
<script src="vendor/alpine.min.js" defer></script>
</head>
<body x-data="vlansPage()" x-init="init()">

<header class="header">
  <div class="header-brand">&#x2B21; rSwitch <span>Management</span></div>
  <div class="header-stats">
    <span>VLANs: <span class="stat-val" x-text="liveVlans.length"></span></span>
    <span x-show="pendingChanges.length > 0" style="color:var(--accent-amber);">
      Pending: <span class="stat-val" style="color:var(--accent-amber)" x-text="pendingChanges.length"></span>
    </span>
  </div>
  <button class="btn btn-sm" type="button" onclick="authLogout()">Logout</button>
</header>

<nav class="sidebar">
  <a href="index.html"><span class="icon">&#x25C8;</span> Dashboard</a>
  <a href="ports.html"><span class="icon">&#x229E;</span> Ports</a>
  <a href="modules.html"><span class="icon">&#x25EC;</span> Modules</a>
  <a href="vlans.html" class="active"><span class="icon">&#x2261;</span> VLANs</a>
  <a href="acls.html"><span class="icon">&#x26CA;</span> ACLs</a>
  <a href="routes.html"><span class="icon">&#x21C4;</span> Routes</a>
  <a href="logs.html"><span class="icon">&#x2630;</span> Logs</a>
  <a href="network.html"><span class="icon">&#x2316;</span> Network</a>
  <a href="dhcp.html"><span class="icon">&#x2690;</span> DHCP Snooping</a>
  <a href="profiles.html"><span class="icon">&#x2699;</span> Profiles</a>
</nav>

<main class="main" :style="pendingChanges.length > 0 ? 'padding-bottom:64px' : ''">
  <div class="page-title flex-between">
    <span><span class="icon">&#x2261;</span> VLAN Management</span>
    <button class="btn btn-primary" @click="showCreate = !showCreate">+ Create VLAN</button>
  </div>

  <div x-show="showCreate" x-transition class="card">
    <div class="card-header">Create VLAN</div>
    <form @submit.prevent="stageCreate()" class="form-inline mt-12">
      <div class="form-group">
        <label>VLAN ID</label>
        <input type="number" x-model.number="newVlan.id" min="1" max="4094" style="width:100px;">
      </div>
      <div class="form-group" x-data="{open:false}" @click.outside="open=false" style="position:relative;">
        <label>Tagged Ports</label>
        <button type="button" class="btn btn-sm" @click="open=!open"
                style="min-width:140px;text-align:left;font-family:var(--font-mono);font-size:12px;"
                x-text="newVlan.tagged.length ? newVlan.tagged.map(i => portName(i)).join(', ') : 'Select...'"></button>
        <div x-show="open" x-transition class="port-dropdown">
          <template x-for="ifidx in portList" :key="'ct-'+ifidx">
            <label class="port-check">
              <input type="checkbox" :value="ifidx"
                     :checked="newVlan.tagged.includes(ifidx)"
                     @change="togglePort(newVlan.tagged, ifidx, $event.target.checked)">
              <span x-text="portName(ifidx)"></span>
            </label>
          </template>
        </div>
      </div>
      <div class="form-group" x-data="{open:false}" @click.outside="open=false" style="position:relative;">
        <label>Untagged Ports</label>
        <button type="button" class="btn btn-sm" @click="open=!open"
                style="min-width:140px;text-align:left;font-family:var(--font-mono);font-size:12px;"
                x-text="newVlan.untagged.length ? newVlan.untagged.map(i => portName(i)).join(', ') : 'Select...'"></button>
        <div x-show="open" x-transition class="port-dropdown">
          <template x-for="ifidx in portList" :key="'cu-'+ifidx">
            <label class="port-check">
              <input type="checkbox" :value="ifidx"
                     :checked="newVlan.untagged.includes(ifidx)"
                     @change="togglePort(newVlan.untagged, ifidx, $event.target.checked)">
              <span x-text="portName(ifidx)"></span>
            </label>
          </template>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Stage</button>
      <button type="button" class="btn" @click="showCreate=false">Cancel</button>
    </form>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tagged Ports</th>
            <th>Untagged Ports</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="row in displayVlans" :key="row.id + '-' + row._status">
            <tr :style="rowStyle(row)">
              <td>
                <span class="vlan-color" :style="'background:hsl(' + (row.id * 37 % 360) + ',60%,50%)'"></span>
                <span x-text="row.id"></span>
              </td>

              <template x-if="editingId === row.id">
                <td>
                  <div x-data="{open:false}" @click.outside="open=false" style="position:relative;display:inline-block;">
                    <button type="button" class="btn btn-sm" @click="open=!open"
                            style="min-width:120px;text-align:left;font-family:var(--font-mono);font-size:12px;"
                            x-text="editForm.tagged.length ? editForm.tagged.map(i => portName(i)).join(', ') : 'Select...'"></button>
                    <div x-show="open" x-transition class="port-dropdown">
                      <template x-for="ifidx in portList" :key="'et-'+ifidx">
                        <label class="port-check">
                          <input type="checkbox" :value="ifidx"
                                 :checked="editForm.tagged.includes(ifidx)"
                                 @change="togglePort(editForm.tagged, ifidx, $event.target.checked)">
                          <span x-text="portName(ifidx)"></span>
                        </label>
                      </template>
                    </div>
                  </div>
                </td>
              </template>
              <template x-if="editingId !== row.id">
                <td class="mono" x-text="portNames(row.tagged_ports)"></td>
              </template>

              <template x-if="editingId === row.id">
                <td>
                  <div x-data="{open:false}" @click.outside="open=false" style="position:relative;display:inline-block;">
                    <button type="button" class="btn btn-sm" @click="open=!open"
                            style="min-width:120px;text-align:left;font-family:var(--font-mono);font-size:12px;"
                            x-text="editForm.untagged.length ? editForm.untagged.map(i => portName(i)).join(', ') : 'Select...'"></button>
                    <div x-show="open" x-transition class="port-dropdown">
                      <template x-for="ifidx in portList" :key="'eu-'+ifidx">
                        <label class="port-check">
                          <input type="checkbox" :value="ifidx"
                                 :checked="editForm.untagged.includes(ifidx)"
                                 @change="togglePort(editForm.untagged, ifidx, $event.target.checked)">
                          <span x-text="portName(ifidx)"></span>
                        </label>
                      </template>
                    </div>
                  </div>
                </td>
              </template>
              <template x-if="editingId !== row.id">
                <td class="mono" x-text="portNames(row.untagged_ports)"></td>
              </template>

              <td>
                <span x-show="row._status === 'live'" class="badge badge-active">Live</span>
                <span x-show="row._status === 'create'" class="badge badge-warn">Pending Create</span>
                <span x-show="row._status === 'delete'" class="badge badge-down">Pending Delete</span>
                <span x-show="row._status === 'update'" class="badge badge-info">Pending Update</span>
              </td>
              <td style="white-space:nowrap;">
                <template x-if="editingId === row.id">
                  <span>
                    <button class="btn btn-sm btn-primary" @click="saveEdit(row.id)">Save</button>
                    <button class="btn btn-sm" @click="cancelEdit()">Cancel</button>
                  </span>
                </template>
                <template x-if="editingId !== row.id && row._status === 'live'">
                  <span>
                    <button class="btn btn-sm" @click="startEdit(row)">Edit</button>
                    <button class="btn btn-sm btn-danger" @click="stageDelete(row.id)">Delete</button>
                  </span>
                </template>
                <template x-if="editingId !== row.id && (row._status === 'create' || row._status === 'delete' || row._status === 'update')">
                  <button class="btn btn-sm" @click="unstage(row.id, row._status)">Undo</button>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <div x-show="displayVlans.length === 0" class="empty-state">
      <div class="icon">&#x2261;</div>
      <div>No VLANs configured</div>
    </div>
  </div>
</main>

<div x-show="pendingChanges.length > 0" x-transition
     style="position:fixed;bottom:0;left:var(--sidebar-w);right:0;height:52px;background:var(--bg-secondary);border-top:2px solid var(--accent-amber);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:95;">
  <span style="font-size:13px;font-weight:600;color:var(--accent-amber);"
        x-text="pendingChanges.length + ' pending change' + (pendingChanges.length > 1 ? 's' : '')"></span>
  <div style="display:flex;gap:8px;">
    <button class="btn" @click="discardAll()">Discard</button>
    <button class="btn btn-primary" @click="applyAll()" :disabled="applying">
      <span x-show="!applying">Apply Changes</span>
      <span x-show="applying"><span class="spinner"></span> Applying...</span>
    </button>
  </div>
</div>

<div x-show="toast" x-transition class="toast" :class="toastClass" x-text="toastMsg"
     x-init="$watch('toast', v => { if(v) setTimeout(()=>toast=false, 3000) })"></div>

<script>
function vlansPage() {
  return {
    liveVlans: [],
    pendingChanges: [],
    showCreate: false,
    portMap: {},
    newVlan: { id: '', tagged: [], untagged: [] },
    editingId: null,
    editForm: { tagged: [], untagged: [] },
    toast: false, toastMsg: '', toastClass: '',
    applying: false,
    _refreshTimer: null,

    init() {
      this.fetchPorts();
      this.fetchVlans();
      this._startAutoRefresh();
    },

    _startAutoRefresh() {
      this._stopAutoRefresh();
      this._refreshTimer = setInterval(() => {
        if (this.pendingChanges.length === 0 && this.editingId === null) this.fetchVlans();
      }, 5000);
    },

    _stopAutoRefresh() {
      if (this._refreshTimer) { clearInterval(this._refreshTimer); this._refreshTimer = null; }
    },

    async fetchPorts() {
      try {
        const d = await (await apiFetch('/api/ports')).json();
        const ports = d.ports || d || [];
        this.portMap = {};
        ports.forEach(p => { this.portMap[p.ifindex] = p.name || ('P' + p.port_id); });
      } catch {}
    },

    portName(ifidx) { return this.portMap[ifidx] || String(ifidx); },

    portNames(arr) { return (arr || []).map(i => this.portName(i)).join(', ') || '\u2014'; },

    get portList() {
      return Object.keys(this.portMap).map(Number).sort((a, b) => a - b);
    },

    togglePort(arr, ifidx, checked) {
      const idx = arr.indexOf(ifidx);
      if (checked && idx === -1) arr.push(ifidx);
      if (!checked && idx !== -1) arr.splice(idx, 1);
    },

    portsToStr(arr) { return (arr || []).join(','); },

    parsePorts(str) {
      if (!str || !str.trim()) return [];
      return str.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n) && n > 0);
    },

    async fetchVlans() {
      try {
        const d = await (await apiFetch('/api/vlans')).json();
        this.liveVlans = d.vlans || d || [];
      } catch {}
    },

    rowStyle(row) {
      if (row._status === 'delete') return 'opacity:0.45;text-decoration:line-through';
      if (row._status === 'create') return 'border-left:3px solid var(--accent-amber)';
      if (row._status === 'update') return 'border-left:3px solid var(--accent-cyan)';
      return '';
    },

    get displayVlans() {
      const deleteIds = new Set(this.pendingChanges.filter(c => c.action === 'delete').map(c => c.id));
      const updateMap = {};
      this.pendingChanges.filter(c => c.action === 'update').forEach(c => { updateMap[c.id] = c; });

      const rows = [];

      for (const v of this.liveVlans) {
        if (deleteIds.has(v.id)) {
          rows.push({ ...v, _status: 'delete' });
        } else if (updateMap[v.id]) {
          const u = updateMap[v.id];
          rows.push({ id: v.id, name: v.name, tagged_ports: u.data.tagged_ports, untagged_ports: u.data.untagged_ports, _status: 'update' });
        } else {
          rows.push({ ...v, _status: 'live' });
        }
      }

      for (const c of this.pendingChanges) {
        if (c.action === 'create') {
          rows.push({ id: c.data.id, name: 'VLAN ' + c.data.id, tagged_ports: c.data.tagged_ports, untagged_ports: c.data.untagged_ports, _status: 'create' });
        }
      }

      rows.sort((a, b) => a.id - b.id);
      return rows;
    },

    stageCreate() {
      const id = this.newVlan.id;
      this.pendingChanges.push({
        action: 'create',
        id: id,
        data: {
          id: id,
          tagged_ports: [...this.newVlan.tagged],
          untagged_ports: [...this.newVlan.untagged]
        }
      });
      this.newVlan = { id: '', tagged: [], untagged: [] };
      this.showCreate = false;
      this.showToast('VLAN ' + id + ' staged for creation', 'toast-info');
    },

    stageDelete(id) {
      if (this.pendingChanges.some(c => c.action === 'delete' && c.id === id)) return;
      this.pendingChanges = this.pendingChanges.filter(c => !(c.action === 'update' && c.id === id));
      this.pendingChanges.push({ action: 'delete', id: id });
      this.showToast('VLAN ' + id + ' staged for deletion', 'toast-info');
    },

    startEdit(row) {
      this.editingId = row.id;
      this.editForm.tagged = [...(row.tagged_ports || [])];
      this.editForm.untagged = [...(row.untagged_ports || [])];
    },

    cancelEdit() { this.editingId = null; },

    saveEdit(id) {
      const tagged = [...this.editForm.tagged];
      const untagged = [...this.editForm.untagged];
      this.pendingChanges = this.pendingChanges.filter(c => !(c.action === 'update' && c.id === id));
      this.pendingChanges.push({ action: 'update', id: id, data: { tagged_ports: tagged, untagged_ports: untagged } });
      this.editingId = null;
      this.showToast('VLAN ' + id + ' staged for update', 'toast-info');
    },

    unstage(id, status) {
      this.pendingChanges = this.pendingChanges.filter(c => !(c.action === status && c.id === id));
      this.showToast('Change reverted', 'toast-info');
    },

    discardAll() {
      this.pendingChanges = [];
      this.editingId = null;
      this.showToast('All pending changes discarded', 'toast-info');
    },

    async applyAll() {
      if (this.applying) return;

      const errors = [];
      const creates = this.pendingChanges.filter(c => c.action === 'create');
      const updates = this.pendingChanges.filter(c => c.action === 'update');
      const deletes = this.pendingChanges.filter(c => c.action === 'delete');

      for (const c of creates) {
        if (!c.data.id || c.data.id < 1 || c.data.id > 4094)
          errors.push('VLAN ' + (c.data.id || '?') + ': ID must be 1-4094');
        if (this.liveVlans.some(v => v.id === c.data.id))
          errors.push('VLAN ' + c.data.id + ': already exists');
      }

      const createIds = creates.map(c => c.data.id);
      const dupes = createIds.filter((v, i) => createIds.indexOf(v) !== i);
      if (dupes.length > 0) errors.push('Duplicate create IDs: ' + [...new Set(dupes)].join(', '));

      for (const c of deletes) {
        if (!this.liveVlans.some(v => v.id === c.id))
          errors.push('VLAN ' + c.id + ': does not exist');
      }

      if (errors.length > 0) {
        this.showToast(errors[0], 'toast-error');
        return;
      }

      this.applying = true;
      let ok = 0, fail = 0;

      for (const c of deletes) {
        try {
          const r = await apiFetch('/api/vlans/' + c.id, { method: 'DELETE' });
          if (r.ok) ok++; else fail++;
        } catch { fail++; }
      }

      for (const c of creates) {
        try {
          const payload = { vlan_id: c.data.id, tagged_ports: c.data.tagged_ports, untagged_ports: c.data.untagged_ports };
          const r = await apiFetch('/api/vlans', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (r.ok) ok++; else fail++;
        } catch { fail++; }
      }

      for (const c of updates) {
        try {
          const payload = { tagged_ports: c.data.tagged_ports, untagged_ports: c.data.untagged_ports };
          const r = await apiFetch('/api/vlans/' + c.id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (r.ok) ok++; else fail++;
        } catch { fail++; }
      }

      this.pendingChanges = [];
      this.applying = false;
      await this.fetchVlans();

      if (fail > 0) {
        this.showToast(ok + ' applied, ' + fail + ' failed', 'toast-error');
      } else {
        this.showToast(ok + ' change' + (ok > 1 ? 's' : '') + ' applied', 'toast-success');
      }
    },

    showToast(msg, cls) { this.toastMsg = msg; this.toastClass = cls; this.toast = true; }
  };
}
</script>
</body>
</html>
