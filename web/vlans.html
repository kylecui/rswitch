<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rSwitch — VLANs</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="auth.js"></script>
<script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
</head>
<body x-data="vlansPage()" x-init="init()">

<header class="header">
  <div class="header-brand">&#x2B21; rSwitch <span>Management</span></div>
  <div class="header-stats">
    <span>VLANs: <span class="stat-val" x-text="liveVlans.length"></span></span>
    <span x-show="pendingChanges.length > 0" style="color:var(--accent-amber);">
      Pending: <span class="stat-val" style="color:var(--accent-amber)" x-text="pendingChanges.length"></span>
    </span>
  </div>
  <button class="btn btn-sm" type="button" onclick="authLogout()">Logout</button>
</header>

<nav class="sidebar">
  <a href="index.html"><span class="icon">&#x25C8;</span> Dashboard</a>
  <a href="ports.html"><span class="icon">&#x229E;</span> Ports</a>
  <a href="modules.html"><span class="icon">&#x25EC;</span> Modules</a>
  <a href="vlans.html" class="active"><span class="icon">&#x2261;</span> VLANs</a>
  <a href="acls.html"><span class="icon">&#x26CA;</span> ACLs</a>
  <a href="routes.html"><span class="icon">&#x21C4;</span> Routes</a>
  <a href="logs.html"><span class="icon">&#x2630;</span> Logs</a>
  <a href="network.html"><span class="icon">&#x2316;</span> Network</a>
  <a href="dhcp.html"><span class="icon">&#x2690;</span> DHCP Snooping</a>
</nav>

<main class="main" :style="pendingChanges.length > 0 ? 'padding-bottom:64px' : ''">
  <div class="page-title flex-between">
    <span><span class="icon">&#x2261;</span> VLAN Management</span>
    <button class="btn btn-primary" @click="showCreate = !showCreate">+ Create VLAN</button>
  </div>

  <div x-show="showCreate" x-transition class="card">
    <div class="card-header">Create VLAN</div>
    <form @submit.prevent="stageCreate()" class="form-inline mt-12">
      <div class="form-group">
        <label>VLAN ID</label>
        <input type="number" x-model.number="newVlan.id" min="1" max="4094" style="width:100px;" required>
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" x-model="newVlan.name" placeholder="e.g. servers" style="width:180px;">
      </div>
      <div class="form-group">
        <label>Tagged Ports</label>
        <input type="text" x-model="newVlan.tagged" placeholder="0,1,2" style="width:140px;">
      </div>
      <div class="form-group">
        <label>Untagged Ports</label>
        <input type="text" x-model="newVlan.untagged" placeholder="3,4" style="width:140px;">
      </div>
      <button type="submit" class="btn btn-primary">Stage</button>
      <button type="button" class="btn" @click="showCreate=false">Cancel</button>
    </form>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Tagged Ports</th>
            <th>Untagged Ports</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="row in displayVlans" :key="row.id + '-' + row._status">
            <tr :style="row._status === 'delete' ? 'opacity:0.45;text-decoration:line-through' : (row._status === 'create' ? 'border-left:3px solid var(--accent-amber)' : '')">
              <td>
                <span class="vlan-color" :style="'background:hsl(' + (row.id * 37 % 360) + ',60%,50%)'"></span>
                <span x-text="row.id"></span>
              </td>
              <td x-text="row.name || '—'"></td>
              <td class="mono" x-text="portNames(row.tagged_ports || row.tagged)"></td>
              <td class="mono" x-text="portNames(row.untagged_ports || row.untagged)"></td>
              <td>
                <span x-show="row._status === 'live'" class="badge badge-active">Live</span>
                <span x-show="row._status === 'create'" class="badge badge-warn">Pending Create</span>
                <span x-show="row._status === 'delete'" class="badge badge-down">Pending Delete</span>
              </td>
              <td>
                <template x-if="row._status === 'live'">
                  <button class="btn btn-sm btn-danger" @click="stageDelete(row.id)">Delete</button>
                </template>
                <template x-if="row._status === 'create' || row._status === 'delete'">
                  <button class="btn btn-sm" @click="unstage(row.id, row._status)">Undo</button>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <div x-show="displayVlans.length === 0" class="empty-state">
      <div class="icon">&#x2261;</div>
      <div>No VLANs configured</div>
    </div>
  </div>
</main>

<div x-show="pendingChanges.length > 0" x-transition
     style="position:fixed;bottom:0;left:var(--sidebar-w);right:0;height:52px;background:var(--bg-secondary);border-top:2px solid var(--accent-amber);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:95;">
  <span style="font-size:13px;font-weight:600;color:var(--accent-amber);"
        x-text="pendingChanges.length + ' pending change' + (pendingChanges.length > 1 ? 's' : '')"></span>
  <div style="display:flex;gap:8px;">
    <button class="btn" @click="discardAll()">Discard</button>
    <button class="btn btn-primary" @click="applyAll()" :disabled="applying">
      <span x-show="!applying">Apply Changes</span>
      <span x-show="applying"><span class="spinner"></span> Applying...</span>
    </button>
  </div>
</div>

<div x-show="toast" x-transition class="toast" :class="toastClass" x-text="toastMsg"
     x-init="$watch('toast', v => { if(v) setTimeout(()=>toast=false, 3000) })"></div>

<script>
function vlansPage() {
  return {
    liveVlans: [],
    pendingChanges: [],
    showCreate: false,
    portMap: {},
    newVlan: { id: '', name: '', tagged: '', untagged: '' },
    toast: false, toastMsg: '', toastClass: '',
    applying: false,
    _refreshTimer: null,

    init() {
      this.fetchPorts();
      this.fetchVlans();
      this._startAutoRefresh();
    },

    _startAutoRefresh() {
      this._stopAutoRefresh();
      this._refreshTimer = setInterval(() => {
        if (this.pendingChanges.length === 0) this.fetchVlans();
      }, 5000);
    },

    _stopAutoRefresh() {
      if (this._refreshTimer) {
        clearInterval(this._refreshTimer);
        this._refreshTimer = null;
      }
    },

    async fetchPorts() {
      try {
        const d = await (await apiFetch('/api/ports')).json();
        const ports = d.ports || d || [];
        this.portMap = {};
        ports.forEach(p => { this.portMap[p.ifindex] = p.name || ('P' + p.port_id); });
      } catch {}
    },

    portName(ifidx) {
      return this.portMap[ifidx] || String(ifidx);
    },

    portNames(arr) {
      return (arr || []).map(i => this.portName(i)).join(', ') || '—';
    },

    async fetchVlans() {
      try {
        const d = await (await apiFetch('/api/vlans')).json();
        this.liveVlans = d.vlans || d || [];
      } catch {}
    },

    get displayVlans() {
      const deleteIds = new Set(
        this.pendingChanges.filter(c => c.action === 'delete').map(c => c.id)
      );

      const rows = [];

      for (const v of this.liveVlans) {
        if (deleteIds.has(v.id)) {
          rows.push({ ...v, _status: 'delete' });
        } else {
          rows.push({ ...v, _status: 'live' });
        }
      }

      for (const c of this.pendingChanges) {
        if (c.action === 'create') {
          rows.push({
            id: c.data.id,
            name: c.data.name,
            tagged_ports: c.data.tagged_ports,
            untagged_ports: c.data.untagged_ports,
            _status: 'create'
          });
        }
      }

      rows.sort((a, b) => a.id - b.id);
      return rows;
    },

    stageCreate() {
      const id = this.newVlan.id;
      if (!id || id < 1 || id > 4094) {
        this.showToast('VLAN ID must be 1-4094', 'toast-error');
        return;
      }

      const alreadyExists = this.liveVlans.some(v => v.id === id) ||
        this.pendingChanges.some(c => c.action === 'create' && c.id === id);
      if (alreadyExists) {
        this.showToast('VLAN ' + id + ' already exists', 'toast-error');
        return;
      }

      this.pendingChanges.push({
        action: 'create',
        id: id,
        data: {
          id: id,
          name: this.newVlan.name,
          tagged_ports: this.newVlan.tagged ? this.newVlan.tagged.split(',').map(Number) : [],
          untagged_ports: this.newVlan.untagged ? this.newVlan.untagged.split(',').map(Number) : []
        }
      });

      this.newVlan = { id: '', name: '', tagged: '', untagged: '' };
      this.showCreate = false;
      this.showToast('VLAN ' + id + ' staged for creation', 'toast-info');
    },

    stageDelete(id) {
      if (this.pendingChanges.some(c => c.action === 'delete' && c.id === id)) return;
      this.pendingChanges.push({ action: 'delete', id: id });
      this.showToast('VLAN ' + id + ' staged for deletion', 'toast-info');
    },

    unstage(id, status) {
      if (status === 'create') {
        this.pendingChanges = this.pendingChanges.filter(c => !(c.action === 'create' && c.id === id));
      } else if (status === 'delete') {
        this.pendingChanges = this.pendingChanges.filter(c => !(c.action === 'delete' && c.id === id));
      }
      this.showToast('Change reverted', 'toast-info');
    },

    discardAll() {
      this.pendingChanges = [];
      this.showToast('All pending changes discarded', 'toast-info');
    },

    async applyAll() {
      if (this.applying) return;
      this.applying = true;
      let ok = 0;
      let fail = 0;

      const deletes = this.pendingChanges.filter(c => c.action === 'delete');
      for (const c of deletes) {
        try {
          const r = await apiFetch('/api/vlans/' + c.id, { method: 'DELETE' });
          if (r.ok) ok++; else fail++;
        } catch { fail++; }
      }

      const creates = this.pendingChanges.filter(c => c.action === 'create');
      for (const c of creates) {
        try {
          const payload = {
            vlan_id: c.data.id,
            name: c.data.name,
            tagged_ports: c.data.tagged_ports,
            untagged_ports: c.data.untagged_ports
          };
          const r = await apiFetch('/api/vlans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (r.ok) ok++; else fail++;
        } catch { fail++; }
      }

      this.pendingChanges = [];
      this.applying = false;
      await this.fetchVlans();

      if (fail > 0) {
        this.showToast(ok + ' applied, ' + fail + ' failed', 'toast-error');
      } else {
        this.showToast(ok + ' change' + (ok > 1 ? 's' : '') + ' applied', 'toast-success');
      }
    },

    showToast(msg, cls) { this.toastMsg = msg; this.toastClass = cls; this.toast = true; }
  };
}
</script>
</body>
</html>
